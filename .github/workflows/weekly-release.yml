name: Weekly release auto-tag

# Tags vYYYY.MM.DD on Tuesdays (after the Monday weekly-audit + Tuesday
# Scorecard runs) when commits exist since the last release tag. Pushing
# the tag with GITHUB_TOKEN does NOT trigger release.yml (GitHub
# suppresses that to prevent recursion), so this workflow dispatches
# release.yml explicitly against the new tag via `gh workflow run`.
#
# Same-day reruns get .N suffixes (v2026.06.02, v2026.06.02.1, ...).
# Manual override available via workflow_dispatch with force=true.

on:
  schedule:
    - cron: '0 8 * * TUE'   # Tuesday 08:00 UTC
  workflow_dispatch:
    inputs:
      force:
        description: 'Tag even if no commits since the last release'
        type: boolean
        default: false
        required: false

permissions:
  contents: read

concurrency:
  group: weekly-release
  cancel-in-progress: false

jobs:
  tag:
    name: Decide, push tag, dispatch release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write   # create + push the annotated tag
      actions: write    # dispatch release.yml via gh workflow run

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: true   # need creds to push the tag

      - name: Determine next tag
        id: next
        env:
          FORCE: ${{ inputs.force }}
        run: |
          today=$(date -u +%Y.%m.%d)
          last_tag=$(git tag --list 'v*' --sort=-version:refname | head -n1 || true)
          echo "Last tag: ${last_tag:-<none>}"

          # Skip if there's nothing to release (unless force=true).
          if [[ -n "${last_tag}" && "${FORCE}" != "true" ]]; then
            commits=$(git rev-list --count "${last_tag}"..HEAD)
            echo "Commits since ${last_tag}: ${commits}"
            if [[ "${commits}" == "0" ]]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "Nothing to release. Skipping."
              exit 0
            fi
          fi

          # Today's tag; suffix .N if the date is already used.
          base="v${today}"
          if ! git rev-parse "refs/tags/${base}" >/dev/null 2>&1; then
            tag="${base}"
          else
            i=1
            while git rev-parse "refs/tags/${base}.${i}" >/dev/null 2>&1; do
              i=$((i+1))
            done
            tag="${base}.${i}"
          fi

          {
            echo "tag=${tag}"
            echo "skip=false"
          } >> "$GITHUB_OUTPUT"
          echo "Will tag: ${tag}"

      - name: Build CHANGELOG entry from auto-generated notes
        id: notes
        if: steps.next.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.next.outputs.tag }}
        run: |
          # gh api releases/generate-notes works even when the tag doesn't
          # exist yet — it uses HEAD vs previous_tag_name heuristics.
          body=$(gh api -X POST "/repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f "tag_name=${TAG}" --jq '.body')
          {
            printf '## [%s] - %s\n\n' "${TAG#v}" "$(date -u +%F)"
            printf '%s\n\n' "${body}"
          } > /tmp/changelog-entry.md
          echo "Auto-generated CHANGELOG entry:"
          cat /tmp/changelog-entry.md

      - name: Commit CHANGELOG update + create + push annotated tag
        if: steps.next.outputs.skip != 'true'
        env:
          TAG: ${{ steps.next.outputs.tag }}
        run: |
          # The CHANGELOG update is committed on a detached HEAD off main, then
          # tagged. Only the tag is pushed — main's CHANGELOG.md is unchanged.
          # This avoids needing a branch-protection bypass, while ensuring the
          # released tarball (built from `git archive HEAD` at the tag) contains
          # the up-to-date CHANGELOG. The next run reads CHANGELOG.md from the
          # last tag (not main) so entries accumulate correctly tag-to-tag.
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Read the CHANGELOG from the last tag (so entries accumulate across
          # releases even though main's CHANGELOG.md stays at the last
          # manually-touched state). Fall back to main's CHANGELOG.md if no
          # tag exists yet.
          last_tag=$(git tag --list 'v*' --sort=-version:refname | head -n1 || true)
          if [ -n "${last_tag}" ] && git rev-parse "refs/tags/${last_tag}" >/dev/null 2>&1; then
            git show "${last_tag}:CHANGELOG.md" > /tmp/CHANGELOG.prev
          else
            cp CHANGELOG.md /tmp/CHANGELOG.prev
          fi

          # Insert the new dated entry immediately before the first existing
          # `## [...]` section. Preserves the intro paragraph above and every
          # existing section below (including [Unreleased] if present) without
          # rewriting them.
          first_section=$(grep -n '^## \[' /tmp/CHANGELOG.prev | head -n1 | cut -d: -f1)
          if [ -z "${first_section}" ]; then
            echo "::error::CHANGELOG.md has no '## [...]' sections — aborting auto-update"
            exit 1
          fi
          {
            head -n "$((first_section - 1))" /tmp/CHANGELOG.prev
            cat /tmp/changelog-entry.md
            tail -n "+${first_section}" /tmp/CHANGELOG.prev
          } > /tmp/CHANGELOG.new

          mv /tmp/CHANGELOG.new CHANGELOG.md

          git add CHANGELOG.md
          git commit -m "Record ${TAG} in CHANGELOG"
          git tag -a "${TAG}" -m "${TAG} — weekly auto-release"
          # Push only the tag. The CHANGELOG commit is reachable via the tag.
          git push origin "${TAG}"

      - name: Dispatch release.yml against the new tag
        if: steps.next.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.next.outputs.tag }}
        run: |
          gh workflow run release.yml --ref "${TAG}"
          echo "Dispatched release.yml for ${TAG}."
