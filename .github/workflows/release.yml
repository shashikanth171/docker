name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  release:
    name: Build, sign, attest, publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write       # gh release create + upload assets
      id-token: write       # Sigstore keyless OIDC (cosign + attestation)
      attestations: write   # actions/attest-build-provenance
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0    # full history so git archive sees the tag

      - name: Resolve version
        id: ver
        run: |
          tag="${GITHUB_REF_NAME}"
          stripped="${tag#v}"
          {
            echo "tag=${tag}"
            echo "stripped=${stripped}"
            echo "base=wnstify-docker-${stripped}"
          } >> "$GITHUB_OUTPUT"

      - name: Build source archives (git-archive — tracked files only)
        env:
          BASE: ${{ steps.ver.outputs.base }}
        run: |
          mkdir -p dist
          git archive --format=tar.gz --prefix="${BASE}/" -o "dist/${BASE}.tar.gz" HEAD
          git archive --format=zip    --prefix="${BASE}/" -o "dist/${BASE}.zip"    HEAD
          ls -la dist/

      - name: Generate SHA256SUMS
        working-directory: dist
        env:
          BASE: ${{ steps.ver.outputs.base }}
        run: |
          sha256sum "${BASE}.tar.gz" "${BASE}.zip" > SHA256SUMS
          cat SHA256SUMS

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Sign SHA256SUMS (Sigstore keyless, bundle format)
        working-directory: dist
        run: |
          # cosign v3 default: emit a single Sigstore bundle containing
          # signature + cert + Rekor inclusion proof. .sigstore.json is
          # the extension Scorecard recognises as a Sigstore bundle.
          cosign sign-blob --yes \
            --bundle SHA256SUMS.sigstore.json \
            SHA256SUMS

      - name: Generate SLSA build-provenance attestation
        id: attest
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: 'dist/wnstify-docker-*'

      - name: Stage SLSA bundle as a release asset
        env:
          BUNDLE: ${{ steps.attest.outputs.bundle-path }}
          BASE: ${{ steps.ver.outputs.base }}
        run: |
          # actions/attest-build-provenance posts the bundle to GitHub's
          # Attestations API by default, but Scorecard's Signed-Releases
          # check only sees provenance if it's attached to the release
          # itself. Copy the bundle alongside our other release assets
          # using the .intoto.jsonl extension Scorecard recognises.
          cp "${BUNDLE}" "dist/${BASE}.intoto.jsonl"
          ls -la dist/

      - name: Build release notes (verification preamble + auto PR list)
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          {
            printf '## Verification\n\n'
            printf 'This release is signed with [Sigstore](https://www.sigstore.dev/) '
            printf '(keyless, via GitHub OIDC) and has a SLSA build-provenance attestation.\n\n'
            printf 'Verification commands: [VERIFICATION.md](https://github.com/%s/blob/%s/VERIFICATION.md)\n\n' \
              "${GITHUB_REPOSITORY}" "${TAG}"
            printf '## Changes\n\n'
            gh api -X POST "/repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
              -f "tag_name=${TAG}" --jq '.body'
          } > dist/RELEASE_NOTES.md
          cat dist/RELEASE_NOTES.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.ver.outputs.tag }}
          BASE: ${{ steps.ver.outputs.base }}
        run: |
          gh release create "${TAG}" \
            --title "${TAG}" \
            --notes-file dist/RELEASE_NOTES.md \
            "dist/${BASE}.tar.gz" \
            "dist/${BASE}.zip" \
            "dist/SHA256SUMS" \
            "dist/SHA256SUMS.sigstore.json" \
            "dist/${BASE}.intoto.jsonl"
