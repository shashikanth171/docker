# Vaultwarden - Hardened Docker Compose (app + postgres)
#
# Architecture:
#   - postgres      official postgres:18.4, internal-only DB network
#   - vaultwarden   vaultwarden/server:1.36.0-alpine, localhost-bound web UI
#
# Security baseline:
#   - Both services run as ${PUID}:${PGID}; prepare ./data ownership first.
#   - cap_drop: ALL, zero cap_add, no-new-privileges, ipc: private.
#   - Vaultwarden listens on high port 8080 inside the container, so it does
#     not need NET_BIND_SERVICE to bind to port 80 as a non-root process.
#   - Postgres is isolated on vaultwarden-db, an external --internal network.
#   - Vaultwarden root filesystem is read-only; writes are limited to /data
#     and tmpfs-backed /tmp.
#   - Web UI binds to 127.0.0.1 only. Put a TLS reverse proxy in front.
#   - Postgres uses SCRAM-SHA-256 and the app connects as a non-root DB user.
#
# Setup:
#   cp .env.example .env  &&  fill strong secrets
#   docker network create vaultwarden-front
#   docker network create --internal vaultwarden-db
#   mkdir -p data/app data/db
#   sudo chown -R "$(id -u):$(id -g)" data
#   docker compose up -d

name: vaultwarden

services:

  postgres:
    image: postgres:18.4
    container_name: vaultwarden-postgres
    restart: unless-stopped
    user: "${PUID:-1000}:${PGID:-1000}"
    environment:
      POSTGRES_USER: "${POSTGRES_USER:?postgres root user required}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?postgres root password required}"
      POSTGRES_DB: "${POSTGRES_DB:-vaultwarden}"
      POSTGRES_NON_ROOT_USER: "${POSTGRES_NON_ROOT_USER:?app db user required}"
      POSTGRES_NON_ROOT_PASSWORD: "${POSTGRES_NON_ROOT_PASSWORD:?app db password required}"
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: --auth-host=scram-sha-256
      # Postgres 18 moved its default data dir under /var/lib/postgresql/18/.
      # Pin it back to keep the bind mount stable across major upgrades.
      PGDATA: /var/lib/postgresql/data
      TZ: "${TZ:-Europe/Bratislava}"
    volumes:
      - ./data/db:/var/lib/postgresql/data
      - ./init-data.sh:/docker-entrypoint-initdb.d/init-data.sh:ro
    networks:
      - vaultwarden-db
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    ipc: private
    tmpfs:
      - /tmp:size=64m
      - /var/run/postgresql:size=64m
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
          pids: 200
        reservations:
          memory: 256m
          cpus: "0.25"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U ${POSTGRES_USER} -d ${POSTGRES_DB:-vaultwarden}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  vaultwarden:
    image: vaultwarden/server:1.36.0-alpine
    container_name: vaultwarden
    restart: unless-stopped
    user: "${PUID:-1000}:${PGID:-1000}"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:${VAULTWARDEN_PORT:-8080}:8080"
    environment:
      # Core runtime paths.
      DATA_FOLDER: /data
      TMP_FOLDER: /tmp
      ROCKET_ADDRESS: 0.0.0.0
      ROCKET_PORT: "8080"
      ROCKET_WORKERS: "${ROCKET_WORKERS:-10}"
      TZ: "${TZ:-Europe/Bratislava}"

      # Database connection. The app never receives the postgres superuser
      # password; init-data.sh creates this least-privilege user on first boot.
      DATABASE_URL: "postgresql://${POSTGRES_NON_ROOT_USER}:${POSTGRES_NON_ROOT_PASSWORD}@postgres:5432/${POSTGRES_DB:-vaultwarden}"
      DB_CONNECTION_RETRIES: "${DB_CONNECTION_RETRIES:-15}"
      DATABASE_MAX_CONNS: "${DATABASE_MAX_CONNS:-10}"

      # Public URL must match the TLS reverse proxy. Bitwarden clients require
      # HTTPS for Web Crypto, attachments, WebAuthn/U2F, and correct links.
      DOMAIN: "${DOMAIN:?public HTTPS URL required}"
      IP_HEADER: "${IP_HEADER:-X-Real-IP}"
      ENABLE_WEBSOCKET: "${ENABLE_WEBSOCKET:-true}"

      # Admin panel. Use an Argon2 PHC string generated by:
      # docker run --rm -it vaultwarden/server:1.36.0-alpine /vaultwarden hash --preset owasp
      ADMIN_TOKEN: "${ADMIN_TOKEN:?argon2id admin token required}"
      ADMIN_SESSION_LIFETIME: "${ADMIN_SESSION_LIFETIME:-20}"
      ADMIN_RATELIMIT_SECONDS: "${ADMIN_RATELIMIT_SECONDS:-300}"
      ADMIN_RATELIMIT_MAX_BURST: "${ADMIN_RATELIMIT_MAX_BURST:-3}"

      # Account hardening. Temporarily set SIGNUPS_ALLOWED=true only for the
      # first account if you do not bootstrap users through the admin panel.
      SIGNUPS_ALLOWED: "${SIGNUPS_ALLOWED:-false}"
      SIGNUPS_VERIFY: "${SIGNUPS_VERIFY:-false}"
      INVITATIONS_ALLOWED: "${INVITATIONS_ALLOWED:-false}"
      PASSWORD_HINTS_ALLOWED: "${PASSWORD_HINTS_ALLOWED:-false}"
      SHOW_PASSWORD_HINT: "${SHOW_PASSWORD_HINT:-false}"
      ORG_CREATION_USERS: "${ORG_CREATION_USERS:-none}"

      # Feature/privacy controls.
      SENDS_ALLOWED: "${SENDS_ALLOWED:-true}"
      EMERGENCY_ACCESS_ALLOWED: "${EMERGENCY_ACCESS_ALLOWED:-true}"
      EMAIL_CHANGE_ALLOWED: "${EMAIL_CHANGE_ALLOWED:-true}"
      ORG_EVENTS_ENABLED: "${ORG_EVENTS_ENABLED:-true}"
      EVENTS_DAYS_RETAIN: "${EVENTS_DAYS_RETAIN:-365}"
      PUSH_ENABLED: "${PUSH_ENABLED:-false}"
      SSO_ENABLED: "${SSO_ENABLED:-false}"

      # Favicon fetching can otherwise become an SSRF probe. Keep non-global
      # IP blocking enabled if you allow icon downloads.
      ICON_SERVICE: "${ICON_SERVICE:-internal}"
      DISABLE_ICON_DOWNLOAD: "${DISABLE_ICON_DOWNLOAD:-false}"
      HTTP_REQUEST_BLOCK_NON_GLOBAL_IPS: "${HTTP_REQUEST_BLOCK_NON_GLOBAL_IPS:-true}"

      # Logging. Reverse proxy logs should redact /notifications/* access_token
      # query values if they are shipped to a central log store.
      EXTENDED_LOGGING: "${EXTENDED_LOGGING:-true}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"

      # Optional SMTP. Set SMTP_FROM and SMTP_HOST in .env to enable mail.
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_FROM: "${SMTP_FROM:-}"
      SMTP_FROM_NAME: "${SMTP_FROM_NAME:-Vaultwarden}"
      SMTP_USERNAME: "${SMTP_USERNAME:-}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
      SMTP_SECURITY: "${SMTP_SECURITY:-starttls}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_AUTH_MECHANISM: "${SMTP_AUTH_MECHANISM:-}"
      SMTP_TIMEOUT: "${SMTP_TIMEOUT:-15}"
      HELO_NAME: "${HELO_NAME:-}"
      SMTP_EMBED_IMAGES: "${SMTP_EMBED_IMAGES:-true}"
      SMTP_DEBUG: "${SMTP_DEBUG:-false}"
      SMTP_ACCEPT_INVALID_CERTS: "false"
      SMTP_ACCEPT_INVALID_HOSTNAMES: "false"
    volumes:
      - ./data/app:/data
    networks:
      - vaultwarden-front
      - vaultwarden-db
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    ipc: private
    read_only: true
    tmpfs:
      - /tmp:size=256m
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
          pids: 150
        reservations:
          memory: 128m
          cpus: "0.1"
    healthcheck:
      test: ["CMD", "/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

networks:
  # External-facing: reverse proxy reaches Vaultwarden via 127.0.0.1 port
  # binding; app also needs egress for SMTP, favicon fetching, and optional
  # Bitwarden push relay traffic.
  vaultwarden-front:
    external: true
  # Internal: postgres only. Create with: docker network create --internal vaultwarden-db
  vaultwarden-db:
    external: true
